<svg viewBox="0 0 980 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect width="980" height="620" fill="#ffffff"/>
  <text x="490" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Async Request Sequence — Happy Path</text>

  <!-- lifelines -->
  <g font-size="12" font-weight="bold" fill="#111827">
    <text x="90" y="55" text-anchor="middle">Client</text>
    <text x="270" y="55" text-anchor="middle">Gateway Thread</text>
    <text x="460" y="55" text-anchor="middle">Worker Pool</text>
    <text x="670" y="55" text-anchor="middle">InferenceClient</text>
    <text x="870" y="55" text-anchor="middle">Python ML Svc</text>
  </g>
  <g stroke="#9ca3af" stroke-width="1.5">
    <line x1="90" y1="65" x2="90" y2="600"/>
    <line x1="270" y1="65" x2="270" y2="600"/>
    <line x1="460" y1="65" x2="460" y2="600"/>
    <line x1="670" y1="65" x2="670" y2="600"/>
    <line x1="870" y1="65" x2="870" y2="600"/>
  </g>

  <!-- messages -->
  <g font-size="11" fill="#111827">
    <line x1="90" y1="90" x2="264" y2="90" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="180" y="83" text-anchor="middle">POST /classify {text}</text>

    <line x1="270" y1="115" x2="270" y2="115" />
    <text x="285" y="118">idempotencyIndex.putIfAbsent(key) — atomic dedupe check</text>

    <line x1="270" y1="145" x2="454" y2="145" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="360" y="138" text-anchor="middle">workerPool.submit(job)</text>

    <line x1="264" y1="170" x2="96" y2="170" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="180" y="163" text-anchor="middle">202 Accepted {jobId, QUEUED}</text>

    <rect x="450" y="195" width="20" height="230" fill="#fde68a" stroke="#b45309"/>
    <text x="480" y="205" font-size="10" fill="#78350f">worker thread busy</text>

    <text x="465" y="225" text-anchor="middle" font-size="10" fill="#78350f">preprocess</text>
    <line x1="460" y1="240" x2="460" y2="240"/>

    <line x1="460" y1="255" x2="664" y2="255" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="565" y="248" text-anchor="middle">classify(text) → CompletableFuture</text>

    <text x="670" y="278" text-anchor="middle" font-size="10" fill="#166534">bulkhead.tryAcquire()</text>

    <line x1="670" y1="295" x2="864" y2="295" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="770" y="288" text-anchor="middle">POST /predict {text} (async, non-blocking)</text>

    <rect x="866" y="300" width="8" height="60" fill="#fecaca" stroke="#b91c1c"/>
    <text x="870" y="378" text-anchor="middle" font-size="10" fill="#7f1d1d">infer</text>

    <line x1="864" y1="375" x2="674" y2="375" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="770" y="368" text-anchor="middle">200 OK {label, confidence}</text>

    <text x="670" y="393" text-anchor="middle" font-size="10" fill="#166534">bulkhead.release()</text>

    <line x1="664" y1="410" x2="466" y2="410" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="565" y="403" text-anchor="middle">future.handle(result) — Stage 3</text>

    <text x="460" y="428" text-anchor="middle" font-size="10" fill="#78350f">postprocess: results.put(jobId, COMPLETED)</text>
    <text x="460" y="443" text-anchor="middle" font-size="10" fill="#78350f">metrics.completed++ · recordLatency()</text>

    <line x1="90" y1="480" x2="264" y2="480" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="180" y="473" text-anchor="middle">GET /status?id=jobId  (client polls)</text>

    <line x1="264" y1="505" x2="96" y2="505" stroke="#374151" stroke-width="1.8" marker-end="url(#arrow2)"/>
    <text x="180" y="498" text-anchor="middle">200 OK {COMPLETED, label, confidence}</text>
  </g>

  <text x="490" y="590" text-anchor="middle" font-size="11" fill="#6b7280">Gateway thread returns immediately after submit() — it never blocks on inference. That's the fan-out/fan-in async composition.</text>
</svg>
