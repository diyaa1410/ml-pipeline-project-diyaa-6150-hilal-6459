<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>

  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#111827">Concurrent ML Classification Pipeline — Architecture</text>

  <!-- Clients -->
  <rect x="30" y="80" width="150" height="70" rx="10" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
  <text x="105" y="110" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e1b4b">Clients</text>
  <text x="105" y="130" text-anchor="middle" font-size="11" fill="#312e81">50+ concurrent</text>

  <!-- Gateway -->
  <rect x="250" y="70" width="220" height="100" rx="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="360" y="95" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e3a8a">API Gateway (Java 21)</text>
  <text x="360" y="115" text-anchor="middle" font-size="11" fill="#1e40af">HttpServer :8080</text>
  <text x="360" y="132" text-anchor="middle" font-size="11" fill="#1e40af">POST /classify · GET /status</text>
  <text x="360" y="149" text-anchor="middle" font-size="11" fill="#1e40af">GET /metrics</text>

  <!-- Bounded queue + pool -->
  <rect x="250" y="210" width="220" height="110" rx="10" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="360" y="233" text-anchor="middle" font-size="13" font-weight="bold" fill="#78350f">Bounded ThreadPoolExecutor</text>
  <text x="360" y="252" text-anchor="middle" font-size="11" fill="#92400e">ArrayBlockingQueue(25)</text>
  <text x="360" y="269" text-anchor="middle" font-size="11" fill="#92400e">N worker threads (= CPU cores)</text>
  <text x="360" y="286" text-anchor="middle" font-size="11" fill="#92400e">AbortPolicy → HTTP 503</text>
  <text x="360" y="303" text-anchor="middle" font-size="11" fill="#92400e">Stage 1: preprocess</text>

  <!-- Network boundary box -->
  <rect x="560" y="200" width="380" height="130" rx="10" fill="none" stroke="#9ca3af" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="750" y="192" text-anchor="middle" font-size="11" fill="#6b7280">real network boundary (HTTP + JSON, 2s timeout)</text>

  <!-- InferenceClient -->
  <rect x="580" y="220" width="150" height="90" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="655" y="243" text-anchor="middle" font-size="12" font-weight="bold" fill="#14532d">InferenceClient</text>
  <text x="655" y="261" text-anchor="middle" font-size="10" fill="#166534">Semaphore(20) bulkhead</text>
  <text x="655" y="277" text-anchor="middle" font-size="10" fill="#166534">async HttpClient</text>
  <text x="655" y="293" text-anchor="middle" font-size="10" fill="#166534">Stage 2: infer</text>

  <!-- Python service -->
  <rect x="770" y="220" width="150" height="90" rx="10" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="845" y="243" text-anchor="middle" font-size="12" font-weight="bold" fill="#7f1d1d">Python ML Service</text>
  <text x="845" y="261" text-anchor="middle" font-size="10" fill="#991b1b">ThreadingHTTPServer</text>
  <text x="845" y="277" text-anchor="middle" font-size="10" fill="#991b1b">:8000  POST /predict</text>
  <text x="845" y="293" text-anchor="middle" font-size="10" fill="#991b1b">stdlib only, no deps</text>

  <!-- Shared state -->
  <rect x="250" y="380" width="220" height="110" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
  <text x="360" y="403" text-anchor="middle" font-size="13" font-weight="bold" fill="#4c1d95">Shared State</text>
  <text x="360" y="422" text-anchor="middle" font-size="11" fill="#5b21b6">ConcurrentHashMap results</text>
  <text x="360" y="439" text-anchor="middle" font-size="11" fill="#5b21b6">ConcurrentHashMap idempotency</text>
  <text x="360" y="456" text-anchor="middle" font-size="11" fill="#5b21b6">immutable JobResult snapshots</text>
  <text x="360" y="473" text-anchor="middle" font-size="11" fill="#5b21b6">Stage 3: postprocess/store</text>

  <!-- Metrics -->
  <rect x="580" y="380" width="220" height="110" rx="10" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <text x="690" y="403" text-anchor="middle" font-size="13" font-weight="bold" fill="#075985">Metrics</text>
  <text x="690" y="422" text-anchor="middle" font-size="11" fill="#0c4a6e">AtomicLong counters</text>
  <text x="690" y="439" text-anchor="middle" font-size="11" fill="#0c4a6e">latency ring buffer</text>
  <text x="690" y="456" text-anchor="middle" font-size="11" fill="#0c4a6e">p50 / p95 / p99</text>
  <text x="690" y="473" text-anchor="middle" font-size="11" fill="#0c4a6e">queue depth, rejects, fallbacks</text>

  <!-- Arrows -->
  <line x1="180" y1="115" x2="248" y2="115" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="170" x2="360" y2="208" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="265" x2="578" y2="265" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="730" y1="265" x2="768" y2="265" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="360" y1="320" x2="360" y2="378" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="470" y1="435" x2="578" y2="435" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="150" y1="150" x2="330" y2="378" stroke="#374151" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="205" y="270" font-size="10" fill="#6b7280" transform="rotate(-58 205 270)">GET /status poll</text>

  <text x="490" y="535" text-anchor="middle" font-size="11" fill="#6b7280">Metrics is fed by every stage (received/completed/failed/rejected/fallback counters + latency samples)</text>
</svg>
