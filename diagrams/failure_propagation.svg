<svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151"/>
    </marker>
  </defs>
  <rect width="980" height="560" fill="#ffffff"/>
  <text x="490" y="28" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Failure Propagation — Two Injected Failure Scenarios</text>

  <!-- Scenario 1: Queue overload -->
  <text x="240" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#92400e">Scenario 1 — Queue Overload (Backpressure)</text>

  <rect x="40" y="90" width="160" height="60" rx="8" fill="#e0e7ff" stroke="#4338ca" stroke-width="2"/>
  <text x="120" y="125" text-anchor="middle" font-size="12" fill="#1e1b4b">Load spike:</text>
  <text x="120" y="140" text-anchor="middle" font-size="11" fill="#312e81">200 req, concurrency 80</text>

  <rect x="40" y="190" width="160" height="60" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="120" y="215" text-anchor="middle" font-size="12" fill="#78350f">ArrayBlockingQueue(25)</text>
  <text x="120" y="233" text-anchor="middle" font-size="11" fill="#92400e">full → RejectedExecutionException</text>

  <rect x="40" y="290" width="160" height="60" rx="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="120" y="315" text-anchor="middle" font-size="12" fill="#7f1d1d">HTTP 503</text>
  <text x="120" y="333" text-anchor="middle" font-size="11" fill="#991b1b">JobResult REJECTED, no job created</text>

  <rect x="40" y="390" width="160" height="60" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="120" y="415" text-anchor="middle" font-size="12" fill="#14532d">System stays up</text>
  <text x="120" y="433" text-anchor="middle" font-size="11" fill="#166534">bounded memory, no crash</text>

  <line x1="120" y1="150" x2="120" y2="188" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="120" y1="250" x2="120" y2="288" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="120" y1="350" x2="120" y2="388" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>

  <text x="120" y="490" text-anchor="middle" font-size="11" fill="#6b7280">measured: 152/200 rejected under</text>
  <text x="120" y="505" text-anchor="middle" font-size="11" fill="#6b7280">deliberate overload — evidence in</text>
  <text x="120" y="520" text-anchor="middle" font-size="11" fill="#6b7280">docs/load-test-results.md</text>

  <!-- divider -->
  <line x1="450" y1="55" x2="450" y2="540" stroke="#d1d5db" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Scenario 2: Python service down/slow -->
  <text x="720" y="65" text-anchor="middle" font-size="14" font-weight="bold" fill="#7f1d1d">Scenario 2 — Inference Service Slow / Down</text>

  <rect x="600" y="90" width="240" height="60" rx="8" fill="#fee2e2" stroke="#b91c1c" stroke-width="2"/>
  <text x="720" y="115" text-anchor="middle" font-size="12" fill="#7f1d1d">Python service killed / chaos mode</text>
  <text x="720" y="133" text-anchor="middle" font-size="11" fill="#991b1b">(POST /chaos delay_ms=3000)</text>

  <rect x="600" y="190" width="240" height="60" rx="8" fill="#dbeafe" stroke="#1d4ed8" stroke-width="2"/>
  <text x="720" y="215" text-anchor="middle" font-size="12" fill="#1e3a8a">InferenceClient.classify()</text>
  <text x="720" y="233" text-anchor="middle" font-size="11" fill="#1e40af">.orTimeout(2, SECONDS) fires</text>

  <rect x="600" y="290" width="240" height="60" rx="8" fill="#fef3c7" stroke="#b45309" stroke-width="2"/>
  <text x="720" y="315" text-anchor="middle" font-size="12" fill="#78350f">.handle((res, ex) -&gt; ...)</text>
  <text x="720" y="333" text-anchor="middle" font-size="11" fill="#92400e">ex != null → fallback branch</text>

  <rect x="600" y="390" width="240" height="60" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="720" y="415" text-anchor="middle" font-size="12" fill="#14532d">JobResult COMPLETED, label=neutral</text>
  <text x="720" y="433" text-anchor="middle" font-size="11" fill="#166534">fallbackUsed=true — client never sees an error</text>

  <line x1="720" y1="150" x2="720" y2="188" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="720" y1="250" x2="720" y2="288" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>
  <line x1="720" y1="350" x2="720" y2="388" stroke="#374151" stroke-width="2" marker-end="url(#arrow3)"/>

  <text x="720" y="490" text-anchor="middle" font-size="11" fill="#6b7280">recovery: chaos disabled → next request</text>
  <text x="720" y="505" text-anchor="middle" font-size="11" fill="#6b7280">completes normally in ~100ms,</text>
  <text x="720" y="520" text-anchor="middle" font-size="11" fill="#6b7280">fallbackUsed resets to false</text>
</svg>
